server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sachin
    username: sachin
    password: sachin
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  eureka:
    client:
      register-with-eureka: true
      fetch-registry: true
      serviceUrl:
        defaultZone: http://localhost:8761/eureka

    instance:
      ip-address: 127.0.0.1
      prefer-ip-address: true
