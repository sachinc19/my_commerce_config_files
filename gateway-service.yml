spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: product-service
#              uri: http://localhost:8081
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/products/**

            - id: order-service
#              uri: http://localhost:8083
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/order/**,/api/cart/**

            - id: user-service
#              uri: http://localhost:8080
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**
            - id: eureka-server
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/web
              filters:
                - SetPath=/

            - id: eureka-server-static
              uri: http://localhost:8761
              predicates:
                - Path=/eureka/**



management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0


server:
  port: 8079

logging:
  level:
    root: info
    org.springframework.cloud.gateway.route.RouteDefinitionLocator: INFO
    org.springframework.cloud.gateway: TRACE

