server:
  port: 8083



spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sachin
    username: sachin
    password: sachin
    driver-class-name: org.postgresql.Driver
  

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    ip-address: 127.0.0.1
    prefer-ip-address: true


logging:
  level:
    root: INFO
    com.ecommerce.user1: TRACE

  file:
    name: log/${spring.application.name}.log

  logback:
    rollingpolicy:
      max-file-size: 5MB
      max-history: 7
