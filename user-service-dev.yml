server:
  port: 8081

spring:
  data:
    mongodb:
      uri:
        database:mongodb://localhost:27017/userdb

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

  instance:
    ip-address: 127.0.0.1
    prefer-ip-address: true
